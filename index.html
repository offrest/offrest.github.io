<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=yes">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="/offrest.ico">
    <title>OFFREST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent 2px),
                repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: -1;
        }

        /* Floating particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.6), rgba(255,255,255,0.1));
            border-radius: 50%;
            opacity: 0.15;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.1; }
            50% { transform: translateY(-50px) translateX(30px); opacity: 0.3; }
        }

        .particle:nth-child(1) { width: 4px; height: 4px; left: 10%; top: 20%; animation: float 8s ease-in-out infinite; }
        .particle:nth-child(2) { width: 6px; height: 6px; left: 80%; top: 10%; animation: float 10s ease-in-out infinite 1s; }
        .particle:nth-child(3) { width: 3px; height: 3px; left: 20%; top: 80%; animation: float 9s ease-in-out infinite 2s; }
        .particle:nth-child(4) { width: 5px; height: 5px; left: 70%; top: 70%; animation: float 11s ease-in-out infinite 1.5s; }
        .particle:nth-child(5) { width: 4px; height: 4px; left: 30%; top: 40%; animation: float 7s ease-in-out infinite 2.5s; }
        .particle:nth-child(6) { width: 3px; height: 3px; left: 60%; top: 30%; animation: float 12s ease-in-out infinite 0.5s; }
        .particle:nth-child(7) { width: 5px; height: 5px; left: 15%; top: 60%; animation: float 8.5s ease-in-out infinite 3s; }
        .particle:nth-child(8) { width: 4px; height: 4px; left: 85%; top: 50%; animation: float 10.5s ease-in-out infinite 1.2s; }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Start Screen */
        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 1;
            transition: opacity 0.5s ease;
            z-index: 10;
            width: 100%;
            max-width: 600px;
        }

        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .tagline {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 60px;
            line-height: 1.4;
        }

        .logo-btn-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin: 0 auto 40px; }
        .logo-button {
            width: 150px; height: 150px; border-radius: 50%; background: transparent; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; position: relative; overflow: hidden; padding: 0; z-index: 2;
        }
        .logo-button:hover { transform: scale(1.08); }
        .logo-button:hover img { box-shadow: 0 0 30px rgba(255,105,180,0.4); }
        .logo-button:active { transform: scale(0.95); }
        .logo-button.rolling { animation: shake 0.5s ease; }
        .pulse-ring {
            position: absolute; width: 170px; height: 170px; border-radius: 50%;
            border: 2px solid rgba(255,105,180,0.5); animation: pulse 2s ease-out infinite; pointer-events: none;
        }
        .pulse-ring:nth-child(2) { animation-delay: 0.6s; }
        .pulse-ring:nth-child(3) { animation-delay: 1.2s; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes shake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-15deg) scale(1.1)} 40%{transform:rotate(15deg) scale(1.1)} 60%{transform:rotate(-10deg) scale(1.05)} 80%{transform:rotate(10deg) scale(1.05)} }

        .tap-text {
            font-size: 1rem;
            letter-spacing: 2px;
            opacity: 0.7;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Result Screen */
        .result-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            width: 100%;
            max-width: 960px;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        .result-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .result-cards {
            display: flex;
            gap: 24px;
            margin-bottom: 40px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 32px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 280px;
            max-width: 440px;
            opacity: 0;
            transform: translateY(30px);
        }
        .card.show { animation: slideUp 0.6s ease forwards; }
        .card:nth-child(2).show { animation-delay: 0.15s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff69b4 0%, #ff1493 100%);
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.1);
        }

        .card-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff69b4;
            margin-bottom: 14px;
            font-weight: 700;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .card-emoji {
            font-size: 2.5rem;
            margin-right: 12px;
            display: inline-block;
        }

        .card-description {
            font-size: 0.95rem;
            opacity: 0.8;
            line-height: 1.6;
            margin-top: 15px;
        }

        .bottom-prompt {
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 30px;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        .reroll-button {
            background: rgba(255, 105, 180, 0.2);
            border: 1px solid rgba(255, 105, 180, 0.5);
            color: #ffffff;
            padding: 12px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin: 20px auto 0;
            display: block;
        }

        .reroll-button:hover {
            background: rgba(255, 105, 180, 0.3);
            border-color: rgba(255, 105, 180, 0.8);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .tagline {
                font-size: 1.8rem;
                margin-bottom: 50px;
            }
            .result-cards {
                flex-direction: column;
                align-items: center;
            }
            .card-title {
                font-size: 1.5rem;
            }

            .logo-button {
                width: 120px;
                height: 120px;
            }

            .pulse-ring {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
            <div class="tagline">Find your rest<br>Feel your rest</div>
            <div class="logo-btn-wrap">
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
